<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Supastack</title>
  <style>
    /* =============================================
       CSS RESET + BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0969da;
      --blue-light: #dbeafe;
      --blue-muted: #54aeff;
      --text: #24292f;
      --text-muted: #656d76;
      --bg: #ffffff;
      --bg-alt: #f6f8fa;
      --border: #d0d7de;
      --border-muted: #e8eaed;
      --sidebar-w: 252px;
      --header-h: 60px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --radius: 6px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow: 0 3px 10px rgba(0,0,0,.10);
      --bg-hover: #eef6ff;
      --blue-border: #bee3f8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* =============================================
       LAYOUT
    ============================================= */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .site-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .site-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .header-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .btn-login {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      color: var(--bg);
      background: var(--text);
      border: 1px solid var(--text);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-login:hover { background: #444c56; border-color: #444c56; text-decoration: none; }

    .btn-login svg { flex-shrink: 0; }

    #layout {
      display: flex;
      min-height: calc(100vh - var(--header-h));
    }

    /* =============================================
       SIDEBAR
    ============================================= */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      padding: 20px 0;
      border-right: 1px solid var(--border);
      background: var(--bg-alt);
    }

    .sidebar-heading {
      padding: 0 16px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .toc-list { list-style: none; }

    .toc-item a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .toc-item a:hover {
      background: var(--blue-light);
      color: var(--blue);
      text-decoration: none;
      border-left-color: var(--blue);
    }

    .toc-item a.active {
      background: var(--blue-light);
      color: var(--blue);
      border-left-color: var(--blue);
      font-weight: 600;
    }

    .toc-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .toc-item a.active .toc-num,
    .toc-item a:hover .toc-num {
      background: var(--blue);
      color: white;
    }

    /* =============================================
       MAIN CONTENT
    ============================================= */
    #main {
      flex: 1;
      min-width: 0;
      padding: 32px 40px 64px;
      max-width: 900px;
    }

    /* =============================================
       MOBILE NAV
    ============================================= */
    #mobile-nav {
      display: none;
      padding: 12px 16px;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
    }

    #mobile-nav-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
    }

    #mobile-nav select {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      font-family: var(--font);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
    }

    /* =============================================
       SECTIONS
    ============================================= */
    .stack-section {
      margin-bottom: 48px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border-muted);
    }

    .section-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      border-left: 4px solid var(--blue);
      padding-left: 12px;
    }

    /* =============================================
       ENTRY TABLE
    ============================================= */
    .entries-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .entries-table thead th {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .entry-row:nth-child(odd) { background: var(--bg); }
    .entry-row:nth-child(even) { background: var(--bg-alt); }
    .entry-row:hover { background: var(--bg-hover); }

    .entry-row td {
      padding: 10px 14px;
      vertical-align: top;
      border-bottom: 1px solid var(--border-muted);
    }

    .entry-row:last-child td { border-bottom: none; }

    .entry-name {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .entry-version {
      font-size: 12px;
      color: var(--text-muted);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      margin-top: 2px;
    }

    .links-cell { min-width: 140px; }

    .link-badges { display: flex; flex-wrap: wrap; gap: 4px; }

    .link-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--blue);
      background: var(--blue-light);
      border: 1px solid var(--blue-border);
      border-radius: 20px;
      text-decoration: none;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .link-badge:hover {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
      text-decoration: none;
    }

    .notes-cell { min-width: 200px; }

    .notes-details summary {
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .notes-details summary::-webkit-details-marker { display: none; }

    .notes-details summary::before {
      content: "▶";
      font-size: 9px;
      transition: transform 0.15s;
      color: var(--text-muted);
    }

    .notes-details[open] summary::before { transform: rotate(90deg); }

    .notes-details[open] summary { color: var(--text); margin-bottom: 6px; }

    .notes-content {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-alt);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin-top: 4px;
    }

    .notes-content code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      background: var(--border-muted);
      padding: 1px 4px;
      border-radius: 3px;
      color: var(--text);
    }

    /* =============================================
       FOOTER
    ============================================= */
    #app-footer {
      margin-top: 64px;
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      background: var(--bg-alt);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      gap: 12px;
      flex-wrap: wrap;
    }

    #app-footer a { color: var(--text-muted); }
    #app-footer a:hover { color: var(--blue); }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #mobile-nav { display: block; }

      #main { padding: 20px 16px 48px; }

      #app-header { padding: 0 16px; }
      .site-subtitle { display: none; }

      .entries-table { font-size: 13px; }

      #app-footer { padding: 16px; }
    }
  </style>
</head>

<!-- =============================================
     RENDER SCRIPT
============================================= -->
<script>
(function () {
  'use strict';

  /* ---------- Parse data ---------- */
  const raw = document.getElementById('stack-data').textContent;
  let data;
  try {
    data = JSON.parse(raw);
  } catch (e) {
    document.getElementById('main').innerHTML =
      '<p style="color:red;padding:2rem;font-family:monospace">JSON parse error: ' + escHtml(e.message) + '</p>';
    return;
  }
  const { sections, meta } = data;

  /* ---------- Header + Footer dates ---------- */
  document.getElementById('header-date').textContent = 'Updated: ' + meta.lastUpdated;
  document.getElementById('footer-meta').textContent =
    'Last updated: ' + meta.lastUpdated + ' · Maintained by ' + meta.owner;

  /* ---------- Helpers ---------- */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderLinks(links) {
    if (!links || links.length === 0) return '<span style="color:var(--text-muted);font-size:12px;">—</span>';
    return '<div class="link-badges">' +
      links.map(l =>
        // SECURITY: When editing is added, validate l.url starts with https:// or http://
        // to prevent javascript: URI injection.
        `<a class="link-badge" href="${escHtml(l.url)}" target="_blank" rel="noopener">${escHtml(l.label)}</a>`
      ).join('') +
      '</div>';
  }

  function renderNotes(notes) {
    if (!notes) return '<span style="color:var(--text-muted);font-size:12px;">—</span>';
    // notes may contain <code> tags — we allow them through (data is trusted)
    // SECURITY: notes is injected as raw HTML to allow <code> tags.
    // When editing is added, sanitize notes through DOMPurify before rendering.
    return `<details class="notes-details">
      <summary>notes</summary>
      <div class="notes-content">${notes}</div>
    </details>`;
  }

  function renderEntry(entry, sectionId, idx) {
    const entryId = `${sectionId}-${idx}`;
    return `<tr class="entry-row" id="${escHtml(entryId)}">
      <td>
        <div class="entry-name">${escHtml(entry.name)}</div>
        ${entry.version ? `<div class="entry-version">${escHtml(entry.version)}</div>` : ''}
      </td>
      <td class="links-cell">${renderLinks(entry.links)}</td>
      <td class="notes-cell">${renderNotes(entry.notes)}</td>
    </tr>`;
  }

  function renderSection(section) {
    const entriesHtml = section.entries.map((e, i) => renderEntry(e, section.id, i)).join('');
    return `
      <section class="stack-section" id="section-${escHtml(section.id)}">
        <div class="section-header">
          <span class="section-order">${section.order}</span>
          <h2 class="section-title">${escHtml(section.title)}</h2>
        </div>
        <table class="entries-table">
          <thead>
            <tr>
              <th style="width:180px">Tool</th>
              <th>Links</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>${entriesHtml}</tbody>
        </table>
      </section>`;
  }

  /* ---------- Build TOC ---------- */
  const tocList = document.getElementById('toc-list');
  const mobileSelect = document.getElementById('mobile-select');

  sections.forEach(section => {
    // Sidebar TOC item
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.dataset.id = section.id;
    li.innerHTML = `<a href="#section-${escHtml(section.id)}">
      <span class="toc-num">${section.order}</span>
      ${escHtml(section.title)}
    </a>`;
    tocList.appendChild(li);

    // Mobile select option
    const opt = document.createElement('option');
    opt.value = section.id;
    opt.textContent = section.order + '. ' + section.title;
    mobileSelect.appendChild(opt);
  });

  /* ---------- Build main content ---------- */
  const main = document.getElementById('main');
  main.innerHTML = sections.map(renderSection).join('');

  /* ---------- Active TOC highlighting (Intersection Observer) ---------- */
  const sectionEls = Array.from(document.querySelectorAll('.stack-section'));
  const tocLinks = Array.from(document.querySelectorAll('.toc-item a'));
  const tocItemMap = {};
  tocLinks.forEach(a => {
    const id = a.getAttribute('href').replace('#section-', '');
    tocItemMap[id] = a;
  });

  let activeId = null;

  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id.replace('section-', '');
        if (id !== activeId) {
          if (activeId && tocItemMap[activeId]) tocItemMap[activeId].classList.remove('active');
          activeId = id;
          if (tocItemMap[id]) tocItemMap[id].classList.add('active');
        }
      }
    });
  }, {
    rootMargin: '-10% 0px -60% 0px',
    threshold: 0
  });

  sectionEls.forEach(el => io.observe(el));

})();
</script>
